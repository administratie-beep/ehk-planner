<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nieuwsbrief Planner — EHK & HCB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #bfa761;
  --gold-lt: #d4bc82;
  --gold-dim: #f5edd8;
  --gold-dark: #8a7340;
  --navy: #1b2a4a;
  --navy-mid: #243760;
  --navy-lt: #e8ecf4;
  --cream: #faf7f2;
  --cream2: #f3ede3;
  --ink: #1a1814;
  --ink2: #4a4640;
  --muted: #8c8880;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --surface: #ffffff;
  --surface2: #f9f6f1;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --seg1-bg:#e4f2eb;--seg1-fg:#0a4f32;--seg1-dot:#1a9e62;
  --seg2-bg:#eae6f8;--seg2-fg:#36267a;--seg2-dot:#6b54d4;
  --seg3-bg:#fdf0df;--seg3-fg:#6b3f0a;--seg3-dot:#d4870f;
  --seg4-bg:#fde8e6;--seg4-fg:#7a1f18;--seg4-dot:#d44035;
  --st-idee-bg:#f1f1f0;--st-idee-fg:#5a5a58;
  --st-wip-bg:#fdf0df;--st-wip-fg:#7a4a0a;
  --st-klaar-bg:#e4f2eb;--st-klaar-fg:#0a4f32;
  --st-ver-bg:#dceefe;--st-ver-fg:#0a3d6b;
  --st-ach-bg:#fde8e6;--st-ach-fg:#7a1f18;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;font-weight:400;background:var(--cream);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Login ── */
.login-wrap{display:none;position:fixed;inset:0;background:var(--navy);z-index:900;align-items:center;justify-content:center;flex-direction:column}
.login-wrap.show{display:flex}
.login-card{background:var(--surface);border-radius:var(--radius-xl);padding:48px 40px;width:calc(100% - 32px);max-width:380px;text-align:center}
.login-emblem{width:64px;height:64px;margin:0 auto 24px;background:var(--navy);border-radius:16px;display:flex;align-items:center;justify-content:center}
.login-emblem svg{width:36px;height:36px}
.login-brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--navy);letter-spacing:.01em;margin-bottom:4px}
.login-tagline{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:32px}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-weight:500}
.login-field input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s}
.login-field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,167,97,.15);background:var(--surface)}
.login-btn{width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;letter-spacing:.02em;transition:background .15s}
.login-btn:hover{background:var(--navy-mid)}
.login-err{font-size:12px;color:#c0392b;margin-top:10px;min-height:16px}
.login-divider{width:40px;height:1px;background:var(--gold);margin:0 auto 24px;opacity:.5}

/* ── App shell ── */
.app-header{position:sticky;top:0;z-index:100;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;gap:16px}
.app-header.hidden{display:none}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:32px;height:32px;background:rgba(191,167,97,.15);border:1px solid rgba(191,167,97,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark svg{width:18px;height:18px}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:white;letter-spacing:.02em;white-space:nowrap}
.brand-sep{color:rgba(191,167,97,.5);margin:0 2px}
.header-right{display:flex;align-items:center;gap:10px}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.45)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;transition:background .3s}
.sync-dot.syncing{background:var(--gold);animation:blink 1s infinite}
.sync-dot.error{background:#f87171}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer;transition:background .15s}
.user-chip:hover{background:rgba(255,255,255,.14)}
.user-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;letter-spacing:.02em}
.av-j{background:var(--seg1-bg);color:var(--seg1-fg)}
.av-m{background:var(--seg2-bg);color:var(--seg2-fg)}
.user-chip-name{font-size:12px;color:rgba(255,255,255,.85);font-weight:400}

/* ── Nav ── */
.app-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:99}
.app-nav.hidden{display:none}
.app-nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;align-items:center;gap:7px;padding:0 22px;height:46px;font-size:13px;color:var(--muted);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;font-family:'Inter',sans-serif;font-weight:400;position:relative}
.nav-btn.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:500}
.nav-btn:hover:not(.active){color:var(--ink)}
.nav-icon{font-size:14px}
.idea-badge{background:var(--gold);color:white;font-size:9px;font-weight:600;padding:1px 5px;border-radius:10px;display:none}

/* ── Main layout ── */
.app-main{max-width:800px;margin:0 auto;padding:24px 16px 80px;display:none}

/* ── Search & filter bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;transition:border-color .15s,box-shadow .15s}
.search-wrap input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,167,97,.12)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.filter-select{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--ink2);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;min-width:130px}
.filter-select:focus{outline:none;border-color:var(--gold)}

/* ── Month label ── */
.month-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:500;padding:20px 2px 10px;display:flex;align-items:center;gap:10px}
.month-label::after{content:'';flex:1;height:1px;background:var(--border)}
.month-label:first-child{padding-top:0}

/* ── Mailing card ── */
.mailing-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.mailing-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07);border-color:var(--border2)}
.mailing-card.has-alert{border-left:3px solid var(--gold)}
.card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.date-block{text-align:center;min-width:36px;flex-shrink:0;padding-top:2px}
.date-day{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--navy);line-height:1}
.date-mon{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:1px}
.card-mid{flex:1;min-width:0}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.card-title{font-size:14px;font-weight:500;color:var(--ink);line-height:1.35}
.card-title.empty{color:var(--muted);font-style:italic;font-weight:300;font-family:'Cormorant Garamond',serif;font-size:15px}
.card-subject{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.card-meta-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.chevron{color:var(--muted);font-size:16px;transition:transform .2s;line-height:1}
.chevron.open{transform:rotate(180deg)}
.comment-pip{width:7px;height:7px;border-radius:50%;background:var(--gold);display:none}
.comment-pip.show{display:block}

/* ── Detail panel ── */
.card-detail{display:none;border-top:1px solid var(--border);background:var(--surface2)}
.card-detail.open{display:block}
.detail-inner{padding:20px}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px}
.dtab{padding:8px 16px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;transition:color .15s}
.dtab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:500}
.dtab-pane{display:none}.dtab-pane.active{display:block}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.fields-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:500}
.field input,.field textarea,.field select{padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;transition:border-color .15s,box-shadow .15s;appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,167,97,.12)}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.detail-actions{display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px}
.detail-info{font-size:11px;color:var(--muted)}

/* ── Links section ── */
.links-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.link-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.link-item a{font-size:13px;color:var(--navy);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-item a:hover{text-decoration:underline}
.link-label{font-size:11px;color:var(--muted);flex-shrink:0}
.link-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 4px;line-height:1}
.link-del:hover{color:#c0392b}
.add-link-row{display:flex;gap:6px;flex-wrap:wrap}
.add-link-row input{flex:1;min-width:120px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:12px;background:var(--surface);color:var(--ink)}
.add-link-row input:focus{outline:none;border-color:var(--gold)}

/* ── Comments ── */
.comments-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:280px;overflow-y:auto}
.comment-item{display:flex;gap:9px;align-items:flex-start}
.comment-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;margin-top:1px}
.comment-body{flex:1;min-width:0}
.comment-bubble{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;line-height:1.5;color:var(--ink)}
.comment-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:8px}
.comment-form{display:flex;gap:8px;align-items:flex-end}
.comment-form textarea{flex:1;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:13px;resize:none;min-height:60px;background:var(--surface);color:var(--ink)}
.comment-form textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,167,97,.12)}
.no-comments{font-size:13px;color:var(--muted);font-style:italic;padding:8px 0}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;letter-spacing:.02em}
.btn-navy{background:var(--navy);color:white;border-color:var(--navy)}
.btn-navy:hover{background:var(--navy-mid)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border2)}
.btn-gold{background:var(--gold);color:white;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-icon{padding:7px 10px}

/* ── Segment badges ── */
.seg1{background:var(--seg1-bg);color:var(--seg1-fg)}
.seg2{background:var(--seg2-bg);color:var(--seg2-fg)}
.seg3{background:var(--seg3-bg);color:var(--seg3-fg)}
.seg4{background:var(--seg4-bg);color:var(--seg4-fg)}
.st-idee{background:var(--st-idee-bg);color:var(--st-idee-fg)}
.st-in-uitwerking{background:var(--st-wip-bg);color:var(--st-wip-fg)}
.st-klaar{background:var(--st-klaar-bg);color:var(--st-klaar-fg)}
.st-verzonden{background:var(--st-ver-bg);color:var(--st-ver-fg)}
.st-achterstand{background:var(--st-ach-bg);color:var(--st-ach-fg)}

/* ── Ideeënbak ── */
.idea-composer{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.composer-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--navy);margin-bottom:14px}
.user-switch{display:flex;gap:6px;margin-bottom:14px}
.user-opt{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;font-size:12px;background:transparent;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
.user-opt.active{background:var(--navy);color:white;border-color:var(--navy)}
.composer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.composer-grid{grid-template-columns:1fr}}
.composer-field{display:flex;flex-direction:column;gap:4px}
.composer-field.span2{grid-column:1/-1}
.composer-field label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:500}
.composer-field textarea,.composer-field select{padding:9px 11px;border:1px solid var(--border2);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:13px;background:var(--surface);color:var(--ink)}
.composer-field textarea{resize:vertical;min-height:64px;line-height:1.5}
.composer-field textarea:focus,.composer-field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,167,97,.12)}
.composer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;flex-wrap:wrap;gap:8px}
.idea-link-row{display:flex;gap:6px;align-items:center}
.idea-link-row input{flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink)}
.idea-link-row input:focus{outline:none;border-color:var(--gold)}
.idea-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:box-shadow .15s}
.idea-item:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.idea-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.idea-body{flex:1;min-width:0}
.idea-text{font-size:14px;line-height:1.45;margin-bottom:5px;color:var(--ink)}
.idea-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.idea-link-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--navy);background:var(--navy-lt);padding:1px 6px;border-radius:10px;text-decoration:none}
.idea-link-badge:hover{text-decoration:underline}
.idea-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px 4px;transition:color .15s}
.idea-del:hover{color:#c0392b}
.ideas-empty{text-align:center;padding:48px 20px;color:var(--muted)}
.ideas-empty-icon{font-size:36px;margin-bottom:10px;opacity:.6}
.ideas-empty-text{font-size:14px}

/* ── Dashboard ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--navy);line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.03em}
.dash-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.dash-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--navy);margin-bottom:14px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-label{font-size:12px;color:var(--ink2);min-width:110px}
.prog-bar{flex:1;height:5px;background:var(--cream2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.prog-count{font-size:12px;color:var(--muted);min-width:28px;text-align:right}
.seg-dash-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.dash-export{margin-top:4px}

/* ── Alert banner ── */
.alert-banner{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.alert-banner-text{color:white;font-size:13px;flex:1}
.alert-banner-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:2px}
.alert-banner-sub{font-size:12px;opacity:.7}
.alert-banner-dismiss{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:white;border-radius:var(--radius);padding:6px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.alert-banner-dismiss:hover{background:rgba(255,255,255,.25)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:9999;border:1px solid rgba(191,167,97,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Logout confirm ── */
.logout-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:800;align-items:center;justify-content:center}
.logout-modal.show{display:flex}
.logout-box{background:var(--surface);border-radius:var(--radius-lg);padding:28px;max-width:300px;width:calc(100% - 32px);text-align:center}
.logout-box h3{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--navy);margin-bottom:8px}
.logout-box p{font-size:13px;color:var(--muted);margin-bottom:20px}

</head>
<body>

<!-- Login -->
<div class="login-wrap show" id="loginWrap">
  <div class="login-card">
    <div class="login-emblem">
      <svg viewBox="0 0 36 36" fill="none">
        <path d="M18 4C12 4 7 9 7 15c0 3.8 1.8 7.1 4.6 9.2V28h12.8v-3.8C27.2 22.1 29 18.8 29 15c0-6-5-11-11-11z" fill="#bfa761"/>
        <rect x="11" y="28" width="14" height="2.5" rx="1.25" fill="rgba(191,167,97,.4)"/>
      </svg>
    </div>
    <div class="login-brand">Nieuwsbrief Planner</div>
    <div class="login-divider"></div>
    <div class="login-tagline">EchtHaar Kliniek &amp; Hair Consultancy Bussum</div>
    <div class="login-field">
      <label>E-mailadres</label>
      <input type="email" id="loginEmail" placeholder="jouw@email.nl" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Wachtwoord</label>

    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- Header -->
<header class="app-header hidden" id="appHeader">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M9 1C5.5 1 3 3.5 3 7c0 2.2 1 4.1 2.6 5.3V14h6.8v-1.7C13.9 11.1 15 9.2 15 7c0-3.5-2.5-6-6-6z" fill="#bfa761"/>
        <rect x="5" y="14" width="8" height="1.5" rx=".75" fill="rgba(191,167,97,.5)"/>
      </svg>
    </div>
    <span class="brand-name">Nieuwsbrief Planner</span>
  </div>
  <div class="header-right">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Verbonden</span>
    </div>
    <div class="user-chip" onclick="showLogoutModal()">
      <div class="user-av av-j" id="userAv">JE</div>
      <span class="user-chip-name" id="userName">Jeffrey</span>
    </div>
  </div>
</header>

<!-- Nav -->
<nav class="app-nav hidden" id="appNav">
  <button class="nav-btn active" onclick="showPage('kalender',this)">
    <span class="nav-icon">📅</span> Kalender
  </button>
  <button class="nav-btn" onclick="showPage('ideeen',this)">
    <span class="nav-icon">💡</span> Ideeënbak
    <span class="idea-badge" id="ideaBadge"></span>
  </button>
  <button class="nav-btn" onclick="showPage('dashboard',this)">
    <span class="nav-icon">📊</span> Dashboard
  </button>
</nav>

<!-- Main -->
<main class="app-main" id="appMain">

  <!-- Kalender -->
  <div id="page-kalender" class="page-content">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Zoek op thema, onderwerp..." oninput="renderKalender()">
      </div>
      <select class="filter-select" id="filterSeg" onchange="renderKalender()">
        <option value="">Alle segmenten</option>
        <option value="seg3">Relaties Man – EHK</option>
        <option value="seg4">Relaties Vrouw – EHK</option>
        <option value="seg1">Debiteuren – EHK</option>
        <option value="seg2">Debiteuren – HCB</option>
      </select>
      <select class="filter-select" id="filterStatus" onchange="renderKalender()">
        <option value="">Alle statussen</option>
        <option>Idee</option>
        <option>In uitwerking</option>
        <option>Klaar</option>
        <option>Verzonden</option>
        <option>Achterstand</option>

    </div>
    <div id="kalenderList"></div>
  </div>

  <!-- Ideeënbak -->
  <div id="page-ideeen" class="page-content" style="display:none">
    <div class="idea-composer">
      <div class="composer-title">Idee inschieten</div>
      <div class="user-switch">
        <button class="user-opt active" id="uopt-jeffrey" onclick="setIdeaUser('jeffrey')">
          <div class="user-av av-j" style="width:20px;height:20px;font-size:8px">JE</div> Jeffrey
        </button>
        <button class="user-opt" id="uopt-mario" onclick="setIdeaUser('mario')">
          <div class="user-av av-m" style="width:20px;height:20px;font-size:8px">MA</div> Mario
        </button>
      </div>
      <div class="composer-grid">
        <div class="composer-field span2">
          <label>Idee / onderwerp</label>
          <textarea id="ideaText" placeholder="Bijv. Klantverhaal na haartransplantatie, seizoensgebonden tips..."></textarea>
        </div>
        <div class="composer-field">
          <label>Bedrijf</label>
          <select id="ideaCompany">
            <option>EchtHaar Kliniek</option>
            <option>Hair Consultancy Bussum</option>
            <option>Beide</option>
          </select>
        </div>
        <div class="composer-field">
          <label>Segment</label>
          <select id="ideaSeg">
            <option value="">Alle segmenten</option>
            <option value="seg3">Relaties Man – EHK</option>
            <option value="seg4">Relaties Vrouw – EHK</option>
            <option value="seg1">Debiteuren – EHK</option>
            <option value="seg2">Debiteuren – HCB</option>
          </select>
        </div>
        <div class="composer-field span2">
          <label>Link (optioneel)</label>
          <div class="idea-link-row">
            <input type="url" id="ideaLink" placeholder="https://...">
          </div>
        </div>
      </div>
      <div class="composer-footer">
        <div style="font-size:11px;color:var(--muted)">Zichtbaar voor Jeffrey &amp; Mario</div>
        <button class="btn btn-gold" onclick="addIdea()">+ Idee toevoegen</button>
      </div>
    </div>
    <div id="ideaList"></div>
  </div>

  <!-- Dashboard -->
  <div id="page-dashboard" class="page-content" style="display:none">
    <div id="dashContent"></div>
  </div>

</main>

<!-- Logout modal -->
<div class="logout-modal" id="logoutModal" onclick="if(event.target===this)hideLogoutModal()">
  <div class="logout-box">
    <h3>Uitloggen</h3>
    <p>Wil je uitloggen uit de Nieuwsbrief Planner?</p>
    <div class="logout-btns">
      <button class="btn btn-ghost" onclick="hideLogoutModal()">Annuleren</button>
      <button class="btn btn-navy" onclick="window._doLogout&&window._doLogout()">Uitloggen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBVFAsBl1jhTvsP6hr0KqQhj-wRL2RWkLM",
  authDomain: "nieuwsbrief-planner.firebaseapp.com",
  projectId: "nieuwsbrief-planner",
  storageBucket: "nieuwsbrief-planner.firebasestorage.app",
  messagingSenderId: "457440458411",
  appId: "1:457440458411:web:a9ef610c19237fe88e69ee"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);

// ── Constants ────────────────────────────────────────────────────────────────
const SEGMENTS = [
  {id:'seg3',label:'Relaties Man – EHK',bedrijf:'EchtHaar Kliniek',segment:'Relaties',geslacht:'Man',cls:'seg3',dot:'var(--seg3-dot)'},
  {id:'seg4',label:'Relaties Vrouw – EHK',bedrijf:'EchtHaar Kliniek',segment:'Relaties',geslacht:'Vrouw',cls:'seg4',dot:'var(--seg4-dot)'},
  {id:'seg1',label:'Debiteuren – EHK',bedrijf:'EchtHaar Kliniek',segment:'Debiteuren',geslacht:'M/V',cls:'seg1',dot:'var(--seg1-dot)'},
  {id:'seg2',label:'Debiteuren – HCB',bedrijf:'Hair Consultancy Bussum',segment:'Debiteuren',geslacht:'M/V',cls:'seg2',dot:'var(--seg2-dot)'},
];
const STATUSES = ['Idee','In uitwerking','Klaar','Verzonden','Achterstand'];
const DOELEN   = ['Verkoop','Educatie','Retentie','Naamsbekendheid','Reactivatie'];
const MONTHS   = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const MONTHS_F = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

function getThursdays() {
  const out = []; let d = new Date(2026,3,23); const end = new Date(2026,11,31);
  while(d<=end){out.push(new Date(d));d.setDate(d.getDate()+7);}
  return out;
}
const thursdays = getThursdays();
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const SOON_DAYS = 7;

// ── State ────────────────────────────────────────────────────────────────────
let mailings = {}, ideas = [], comments = {}, links = {};
let expanded = {}, activeDetailTab = {};
let ideaUser = 'jeffrey';
let currentUserEmail = '';
let unsub1 = null, unsub2 = null, unsub3 = null, unsub4 = null;
let alertDismissed = false;

// ── Sync dot ─────────────────────────────────────────────────────────────────
function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if(s==='ok'){dot.className='sync-dot';lbl.textContent='Verbonden';}
  else if(s==='syncing'){dot.className='sync-dot syncing';lbl.textContent='Opslaan...';}
  else{dot.className='sync-dot error';lbl.textContent='Offline';}
}

// ── Firestore ─────────────────────────────────────────────────────────────────
function startListeners() {
  unsub1 = onSnapshot(collection(db,'mailings'), snap => {
    setSyncStatus('ok');
    snap.forEach(d => { mailings[d.id] = d.data(); });
    renderCurrent();
  }, ()=>setSyncStatus('error'));

  unsub2 = onSnapshot(query(collection(db,'ideas'),orderBy('ts','desc')), snap => {
    ideas = snap.docs.map(d=>({fbId:d.id,...d.data()}));
    renderCurrent(); updateIdeaBadge();
  }, ()=>{});

  unsub3 = onSnapshot(collection(db,'comments'), snap => {
    comments = {};
    snap.forEach(d => {
      const dat = d.data();
      if(!comments[dat.mailingKey]) comments[dat.mailingKey]=[];
      comments[dat.mailingKey].push({fbId:d.id,...dat});
    });
    Object.keys(comments).forEach(k=>comments[k].sort((a,b)=>a.ts-b.ts));
    renderCurrent();
  }, ()=>{});

  unsub4 = onSnapshot(collection(db,'links'), snap => {
    links = {};
    snap.forEach(d => {
      const dat = d.data();
      if(!links[dat.mailingKey]) links[dat.mailingKey]=[];
      links[dat.mailingKey].push({fbId:d.id,...dat});
    });
    renderCurrent();
  }, ()=>{});
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const stCls = s => 'st-'+s.toLowerCase().replace(/\s+/g,'-');
const dateKey = d => d.toISOString().slice(0,10);
const getMailing = (key,si) => { if(!mailings[key]) mailings[key]={status:'Idee',thema:'',subject:'',cta:'',doel:'',notities:'',segIdx:si}; return mailings[key]; };

function isUrgent(d, status) {
  if(status==='Verzonden') return false;
  const diff = (d - TODAY) / 86400000;
  return diff >= 0 && diff <= SOON_DAYS;
}
function isPast(d, status) {
  return status !== 'Verzonden' && d < TODAY;
}

// ── Render kalender ───────────────────────────────────────────────────────────
function renderKalender() {
  const search = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const segF   = document.getElementById('filterSeg')?.value||'';
  const stF    = document.getElementById('filterStatus')?.value||'';

  // Alert: upcoming this week
  let alertHtml = '';
  if(!alertDismissed) {
    const upcoming = thursdays.filter((d,i) => {
      const diff = (d - TODAY) / 86400000;
      const m = getMailing(dateKey(d), i%4);
      return diff >= 0 && diff <= SOON_DAYS && m.status !== 'Verzonden';
    });
    if(upcoming.length > 0) {
      const d = upcoming[0]; const i = thursdays.indexOf(d);
      const seg = SEGMENTS[i%4];
      const diff = Math.round((d-TODAY)/86400000);
      alertHtml = `<div class="alert-banner">
        <div class="alert-banner-text">
          <div class="alert-banner-title">Mailing over ${diff===0?'vandaag':diff+' dagen'}</div>
          <div class="alert-banner-sub">${seg.label} · ${d.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <button class="alert-banner-dismiss" onclick="alertDismissed=true;renderKalender()">Sluiten</button>
      </div>`;
    }
  }

  let html = alertHtml;
  let curMonth = -1;
  let shown = 0;

  thursdays.forEach((d,i) => {
    const seg = SEGMENTS[i%4];
    const key = dateKey(d);
    const m = getMailing(key, i%4);

    // Filters
    if(segF && seg.id !== segF) return;
    if(stF && m.status !== stF) return;
    if(search && !((m.thema||'').toLowerCase().includes(search) || (m.subject||'').toLowerCase().includes(search) || seg.label.toLowerCase().includes(search))) return;

    shown++;
    const mo = d.getMonth();
    if(mo !== curMonth) { html += `<div class="month-label">${MONTHS_F[mo]}</div>`; curMonth=mo; }

    const isExp = !!expanded[key];
    const urgent = isUrgent(d, m.status);
    const past = isPast(d, m.status);
    const hasComments = (comments[key]||[]).length > 0;
    const hasLinks = (links[key]||[]).length > 0;
    const activeTab = activeDetailTab[key] || 'content';

    const commentList = (comments[key]||[]).map(c => {
      const isJ = c.user==='jeffrey';
      return `<div class="comment-item">
        <div class="comment-av ${isJ?'av-j':'av-m'}">${isJ?'JE':'MA'}</div>
        <div class="comment-body">
          <div class="comment-bubble">${esc(c.text)}</div>
          <div class="comment-meta"><span>${isJ?'Jeffrey':'Mario'}</span><span>${c.date||''}</span></div>
        </div>
      </div>`;
    }).join('') || '<div class="no-comments">Nog geen opmerkingen.</div>';

    const linkList = (links[key]||[]).map(l =>
      `<div class="link-item">
        <span class="link-label">${esc(l.label||'Link')}</span>
        <a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.url)}</a>
        <button class="link-del" onclick="deleteLink('${l.fbId}')">×</button>
      </div>`
    ).join('') || '';

    html += `<div class="mailing-card${urgent||past?' has-alert':''}" id="card-${key}">
      <div class="card-header" onclick="toggleExpand('${key}')">
        <div class="date-block">
          <div class="date-day">${d.getDate()}</div>
          <div class="date-mon">${MONTHS[mo]}</div>
        </div>
        <div class="card-mid">
          <div class="card-badges">
            <span class="badge ${seg.cls}">${seg.label}</span>
            <span class="badge ${stCls(m.status)}">${m.status}</span>
            ${urgent?'<span class="badge" style="background:#fdf0df;color:#7a4f0d">⏰ Binnenkort</span>':''}
            ${past?'<span class="badge" style="background:#fde8e6;color:#7a1f18">⚠ Verlopen</span>':''}
          </div>
          <div class="card-title ${m.thema?'':'empty'}">${esc(m.thema)||'Nog geen thema'}</div>
          ${m.subject?`<div class="card-subject">${esc(m.subject)}</div>`:''}
          <div class="card-meta">
            ${m.doel?`<span class="card-meta-item">◈ ${m.doel}</span>`:''}
            ${hasComments?`<span class="card-meta-item" style="color:var(--gold)">💬 ${(comments[key]||[]).length}</span>`:''}
            ${hasLinks?`<span class="card-meta-item" style="color:var(--navy)">🔗 ${(links[key]||[]).length}</span>`:''}
          </div>
        </div>
        <div class="card-right">
          <div class="chevron ${isExp?'open':''}">⌄</div>
        </div>
      </div>
      <div class="card-detail ${isExp?'open':''}" id="det-${key}">
        <div class="detail-inner">
          <div class="detail-tabs">
            <button class="dtab ${activeTab==='content'?'active':''}" onclick="setDetailTab('${key}','content')">Inhoud</button>
            <button class="dtab ${activeTab==='comments'?'active':''}" onclick="setDetailTab('${key}','comments')">Opmerkingen ${hasComments?`(${(comments[key]||[]).length})`:''}  </button>
            <button class="dtab ${activeTab==='links'?'active':''}" onclick="setDetailTab('${key}','links')">Links ${hasLinks?`(${(links[key]||[]).length})`:''}  </button>
          </div>

          <div class="dtab-pane ${activeTab==='content'?'active':''}">
            <div class="fields-grid">
              <div class="field full"><label>Thema nieuwsbrief</label>
                <input type="text" value="${esc(m.thema)}" placeholder="Bijv. Haarverzorging lente 2026" onchange="setField('${key}','thema',this.value)"></div>
              <div class="field full"><label>Onderwerpregel</label>
                <input type="text" value="${esc(m.subject)}" placeholder="Bijv. 🌸 Klaar voor de lente?" onchange="setField('${key}','subject',this.value)"></div>
              <div class="field"><label>Status</label>
                <select onchange="setField('${key}','status',this.value)">${STATUSES.map(s=>`<option ${m.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
              <div class="field"><label>Doel mailing</label>
                <select onchange="setField('${key}','doel',this.value)"><option value="">— Kies doel —</option>${DOELEN.map(s=>`<option ${m.doel===s?'selected':''}>${s}</option>`).join('')}</select></div>
              <div class="field full"><label>Call-to-action</label>
                <input type="text" value="${esc(m.cta)}" placeholder="Bijv. Plan een afspraak" onchange="setField('${key}','cta',this.value)"></div>
              <div class="field full"><label>Notities</label>
                <textarea placeholder="Interne notities..." onchange="setField('${key}','notities',this.value)">${esc(m.notities)}</textarea></div>
            </div>
            <div class="detail-actions">
              <div class="detail-info">${seg.bedrijf} · ${seg.geslacht}</div>
              <button class="btn btn-navy" onclick="saveMailing('${key}')">Opslaan</button>
            </div>
          </div>

          <div class="dtab-pane ${activeTab==='comments'?'active':''}">
            <div class="comments-list">${commentList}</div>
            <div class="comment-form">
              <textarea id="ctxt-${key}" placeholder="Voeg een opmerking toe..."></textarea>
              <button class="btn btn-navy btn-sm" onclick="addComment('${key}')">Sturen</button>
            </div>
          </div>

          <div class="dtab-pane ${activeTab==='links'?'active':''}">
            <div class="links-list">${linkList}</div>
            <div class="add-link-row">
              <input type="text" id="llbl-${key}" placeholder="Label (bijv. Briefing doc)">
              <input type="url" id="lurl-${key}" placeholder="https://...">
              <button class="btn btn-ghost btn-sm" onclick="addLink('${key}')">+ Link</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  });

  if(shown===0) html += '<div style="text-align:center;padding:48px 0;color:var(--muted);font-size:14px">Geen mailings gevonden voor deze filters.</div>';
  document.getElementById('kalenderList').innerHTML = html;
}

// ── Render ideeën ─────────────────────────────────────────────────────────────
function renderIdeeen() {
  const segMap = {}; SEGMENTS.forEach(s=>segMap[s.id]=s);
  const el = document.getElementById('ideaList');
  if(ideas.length===0){
    el.innerHTML=`<div class="ideas-empty"><div class="ideas-empty-icon">💡</div><div class="ideas-empty-text">Nog geen ideeën. Schiet er gerust eentje in!</div></div>`;
    return;
  }
  el.innerHTML = ideas.map(idea => {
    const isJ = idea.user==='jeffrey';
    const seg = segMap[idea.segId];
    return `<div class="idea-item">
      <div class="idea-av ${isJ?'av-j':'av-m'}">${isJ?'JE':'MA'}</div>
      <div class="idea-body">
        <div class="idea-text">${esc(idea.text)}</div>
        <div class="idea-meta">
          <span>${isJ?'Jeffrey':'Mario'}</span>
          <span style="opacity:.4">·</span>
          <span>${esc(idea.company)}</span>
          ${seg?`<span style="opacity:.4">·</span><span class="badge ${seg.cls}" style="font-size:10px">${seg.label}</span>`:''}
          ${idea.link?`<a class="idea-link-badge" href="${esc(idea.link)}" target="_blank" rel="noopener">🔗 Link</a>`:''}
          <span style="opacity:.4">·</span>
          <span>${esc(idea.date)}</span>
        </div>
      </div>
      <button class="idea-del" onclick="deleteIdea('${idea.fbId}')" title="Verwijderen">×</button>
    </div>`;
  }).join('');
}

// ── Render dashboard ──────────────────────────────────────────────────────────
function renderDashboard() {
  const total = thursdays.length;
  const counts = {}; STATUSES.forEach(s=>counts[s]=0);
  thursdays.forEach((d,i) => {
    const m = getMailing(dateKey(d),i%4);
    counts[m.status]=(counts[m.status]||0)+1;
  });
  const done = counts['Verzonden']||0;
  const pct = Math.round(done/total*100);
  const stColors = {'Idee':'#9ca3af','In uitwerking':'#d97706','Klaar':'#059669','Verzonden':'#0284c7','Achterstand':'#dc2626'};

  document.getElementById('dashContent').innerHTML = `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Mailings gepland</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-lbl">Verzonden</div></div>
    <div class="stat-card"><div class="stat-num">${counts['Klaar']||0}</div><div class="stat-lbl">Klaar</div></div>
    <div class="stat-card"><div class="stat-num">${counts['Achterstand']||0}</div><div class="stat-lbl">Achterstand</div></div>
    <div class="stat-card"><div class="stat-num">${ideas.length}</div><div class="stat-lbl">Ideeën</div></div>
  </div>
  <div class="dash-section">
    <div class="dash-title">Voortgang 2026</div>
    <div class="progress-row">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:var(--navy)"></div></div>
      <div class="prog-count">${pct}%</div>
    </div>
    <div style="font-size:12px;color:var(--muted)">${done} van ${total} mailings verzonden</div>
  </div>
  <div class="dash-section">
    <div class="dash-title">Status verdeling</div>
    ${STATUSES.map(s=>{const c=counts[s]||0;const p=Math.round(c/total*100);return`<div class="progress-row">
      <div class="prog-label"><span class="badge ${stCls(s)}">${s}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${stColors[s]}"></div></div>
      <div class="prog-count">${c}</div>
    </div>`;}).join('')}
  </div>
  <div class="dash-section">
    <div class="dash-title">Per segment</div>
    ${SEGMENTS.map((seg,si)=>{
      const keys=thursdays.filter((_,i)=>i%4===si).map(d=>dateKey(d));
      const sent=keys.filter(k=>mailings[k]&&mailings[k].status==='Verzonden').length;
      const p=Math.round(sent/keys.length*100);
      return`<div class="progress-row">
        <div class="prog-label"><span class="badge ${seg.cls}" style="font-size:10px">${seg.label}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${seg.dot}"></div></div>
        <div class="prog-count">${sent}/${keys.length}</div>
      </div>`;
    }).join('')}
  </div>
  <div class="dash-section dash-export">
    <div class="dash-title">Export</div>
    <button class="btn btn-ghost" onclick="window._exportCSV&&window._exportCSV()">⬇ Exporteren als CSV</button>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
window.toggleExpand = key => { expanded[key]=!expanded[key]; renderKalender(); };
window.setDetailTab = (key,tab) => { activeDetailTab[key]=tab; renderKalender(); };
window.setField = (key,field,val) => { if(!mailings[key]) return; mailings[key][field]=val; };
window.setIdeaUser = u => {
  ideaUser=u;
  document.querySelectorAll('.user-opt').forEach(b=>b.classList.remove('active'));
  document.getElementById('uopt-'+u).classList.add('active');
};

async function saveMailing(key) {
  setSyncStatus('syncing');
  try { await setDoc(doc(db,'mailings',key),mailings[key]); setSyncStatus('ok'); showToast('Opgeslagen ✓'); renderKalender(); }
  catch(e) { setSyncStatus('error'); showToast('Fout bij opslaan'); }
}
window.saveMailing = saveMailing;

async function addIdea() {
  const txt = document.getElementById('ideaText').value.trim(); if(!txt) return;
  const link = document.getElementById('ideaLink').value.trim();
  const now = new Date();
  setSyncStatus('syncing');
  try {
    await addDoc(collection(db,'ideas'),{user:ideaUser,text:txt,company:document.getElementById('ideaCompany').value,segId:document.getElementById('ideaSeg').value,link,date:now.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}),ts:now.getTime()});
    document.getElementById('ideaText').value=''; document.getElementById('ideaLink').value='';
    setSyncStatus('ok'); showToast('Idee toegevoegd!');
  } catch(e) { setSyncStatus('error'); showToast('Fout bij opslaan'); }
}
window.addIdea = addIdea;

async function deleteIdea(fbId) {
  setSyncStatus('syncing');
  try { await deleteDoc(doc(db,'ideas',fbId)); setSyncStatus('ok'); } catch(e) { setSyncStatus('error'); }
}
window.deleteIdea = deleteIdea;

async function addComment(key) {
  const el = document.getElementById('ctxt-'+key);
  const txt = el?.value.trim(); if(!txt) return;
  const now = new Date();
  setSyncStatus('syncing');
  try {
    await addDoc(collection(db,'comments'),{mailingKey:key,user:ideaUser,text:txt,date:now.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}),ts:now.getTime()});
    el.value=''; setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); showToast('Fout bij opslaan'); }
}
window.addComment = addComment;

async function addLink(key) {
  const lbl = document.getElementById('llbl-'+key)?.value.trim()||'Link';
  const url = document.getElementById('lurl-'+key)?.value.trim(); if(!url) return;
  setSyncStatus('syncing');
  try {
    await addDoc(collection(db,'links'),{mailingKey:key,label:lbl,url,ts:Date.now()});
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); showToast('Fout bij opslaan'); }
}
window.addLink = addLink;

async function deleteLink(fbId) {
  setSyncStatus('syncing');
  try { await deleteDoc(doc(db,'links',fbId)); setSyncStatus('ok'); } catch(e) { setSyncStatus('error'); }
}
window.deleteLink = deleteLink;

// ── Page switching ────────────────────────────────────────────────────────────
window.showPage = (name, btn) => {
  document.querySelectorAll('.page-content').forEach(p=>p.style.display='none');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).style.display='block';
  btn.classList.add('active');
  renderCurrent();
};

function renderCurrent() {
  const pages = ['kalender','ideeen','dashboard'];
  const active = pages.find(p => document.getElementById('page-'+p)?.style.display !== 'none');
  if(active==='kalender') renderKalender();
  else if(active==='ideeen') renderIdeeen();
  else if(active==='dashboard') renderDashboard();
}

function updateIdeaBadge() {
  const el = document.getElementById('ideaBadge');
  if(ideas.length>0){el.textContent=ideas.length;el.style.display='inline';}
  else el.style.display='none';
}

// ── Export ────────────────────────────────────────────────────────────────────
window._exportCSV = () => {
  const rows=[['Datum','Bedrijf','Segment','Geslacht','Thema','Onderwerpregel','Doel','CTA','Status','Notities']];
  thursdays.forEach((d,i)=>{
    const seg=SEGMENTS[i%4]; const key=dateKey(d); const m=getMailing(key,i%4);
    rows.push([d.toLocaleDateString('nl-NL'),seg.bedrijf,seg.segment,seg.geslacht,m.thema,m.subject,m.doel,m.cta,m.status,m.notities]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'})),download:'nieuwsbrief_kalender_2026.csv'});
  a.click(); showToast('CSV gedownload!');
};

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Auth ──────────────────────────────────────────────────────────────────────
window._doLogin = async () => {
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  if(!email||!pass){err.textContent='Vul je gegevens in.';return;}
  try { await signInWithEmailAndPassword(auth,email,pass); }
  catch(e) { err.textContent='Inloggen mislukt. Controleer je gegevens.'; }
};

window._doLogout = async () => {
  if(unsub1)unsub1(); if(unsub2)unsub2(); if(unsub3)unsub3(); if(unsub4)unsub4();
  await signOut(auth); hideLogoutModal();
};

window.showLogoutModal = () => document.getElementById('logoutModal').classList.add('show');
window.hideLogoutModal = () => document.getElementById('logoutModal').classList.remove('show');

onAuthStateChanged(auth, user => {
  const loginWrap = document.getElementById('loginWrap');
  const header = document.getElementById('appHeader');
  const nav = document.getElementById('appNav');
  const main = document.getElementById('appMain');

  if(user) {
    loginWrap.classList.remove('show');
    header.classList.remove('hidden');
    nav.classList.remove('hidden');
    main.style.display='block';

    currentUserEmail = user.email;
    const isJeffrey = user.email.toLowerCase().includes('lenting') || user.email.toLowerCase().includes('jeffrey');
    const u = isJeffrey ? 'jeffrey' : 'mario';
    ideaUser = u;
    document.getElementById('userName').textContent = isJeffrey?'Jeffrey':'Mario';
    document.getElementById('userAv').className = 'user-av '+(isJeffrey?'av-j':'av-m');
    document.getElementById('userAv').textContent = isJeffrey?'JE':'MA';
    document.querySelectorAll('.user-opt').forEach(b=>b.classList.remove('active'));
    const uBtn = document.getElementById('uopt-'+u);
    if(uBtn) uBtn.classList.add('active');

    startListeners();
    renderKalender();
  } else {
    loginWrap.classList.add('show');
    header.classList.add('hidden');
    nav.classList.add('hidden');
    main.style.display='none';
  }
});
</script>
</body>
